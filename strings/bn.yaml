taintmessage: আপনি যে বিষয়বস্তু চেয়েছেন, তাতে অন্য একটি বট থেকে নেওয়া মিডিয়া রয়েছে।
  এই মিডিয়া বর্তমান বটের মাধ্যমে দেখানো সম্ভব নয় এবং এটি আপডেট করা প্রয়োজন। এই বিষয়বস্তুটিকে
  সম্পূর্ণরূপে সরিয়ে ফেলার জন্য "ডিলিট" বোতামে ক্লিক করুন, অথবা "আপডেট" বোতামে ক্লিক
